name: Deploy to Vercel

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      deployments: write 

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        timeout-minutes: 5

      - name: Create GitHub Deployment
        uses: chrnorm/deployment-action@v2
        id: deployment
        with:
          token: '${{ github.token }}'
          environment: ${{ github.event_name == 'pull_request' && 'preview' || 'production' }}

      - name: Pull Vercel Environment
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            npx vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
          else
            npx vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
          fi

      # --- STEP 3: BUILD PROJECT ---
      - name: Build Project Artifacts
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            npx vercel build --token=${{ secrets.VERCEL_TOKEN }}
          else
            npx vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
          fi
          
      - name: Deploy to Vercel
        id: vercel_deploy
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            url=$(npx vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          else
            url=$(npx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          fi
          echo "DEPLOY_URL=$url" >> "$GITHUB_OUTPUT"
      
      - name: Update GitHub Deployment Status
        if: success()
        uses: chrnorm/deployment-status@v2
        with:
          token: '${{ github.token }}'
          environment-url: ${{ steps.vercel_deploy.outputs.DEPLOY_URL }}
          state: 'success'
          description: 'Vercel Deployment is live!'
          deployment-id: ${{ steps.deployment.outputs.deployment_id }}

      - name: Update GitHub Deployment Failure
        if: failure()
        uses: chrnorm/deployment-status@v2
        with:
          token: '${{ github.token }}'
          state: 'failure'
          deployment-id: ${{ steps.deployment.outputs.deployment_id }}

      - name: PR Comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.vercel_deploy.outputs.DEPLOY_URL }}';
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `Vercel Preview ready!\n\n[View Deployment](${url})`
            });

      - name: Summary
        if: always()
        run: |
          echo "Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "Event: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "URL: ${{ steps.vercel_deploy.outputs.DEPLOY_URL }}" >> $GITHUB_STEP_SUMMARY